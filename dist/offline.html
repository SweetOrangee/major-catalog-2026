<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#F4EFE4" />
<meta name="description" content="《普通高等学校本科专业目录（2026 年）》交互查阅 · 教育部 2026 年 4 月发布" />
<title>本科专业目录 · 2026 · 教育部</title>
<style>
/* =========================================================
   本科专业目录 · 2026
   学院派编辑设计：纸面、墨色、朱砂红，宋体大字与中文留白
   ========================================================= */

:root {
  /* 纸张色调：偏暖的米黄，模拟内文用纸 */
  --paper:       #F3EDDF;
  --paper-soft:  #FAF5E8;
  --paper-deep:  #E9E1CD;

  /* 墨色谱：主文 / 次文 / 浅墨 */
  --ink:         #1A1815;
  --ink-soft:    #5C544A;
  --ink-mute:    #8E847A;

  /* 朱砂红：钤印、特设标记、强调 */
  --vermilion:   #9C2A1C;
  --vermilion-deep: #7A1F14;
  --seal-bg:     #B53127;

  /* 国控蓝：仅作 K 标签 */
  --indigo:      #2C3E66;

  /* 分隔线 / 阴影 */
  --rule:        #C9BFA8;
  --rule-soft:   #DDD4BD;

  /* 字体 */
  --font-serif:  "Songti SC", "STSong", "SimSun", "Source Han Serif SC", "Noto Serif SC", serif;
  --font-sans:   "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Source Han Sans SC", "Noto Sans SC", system-ui, sans-serif;
  --font-mono:   "SF Mono", "JetBrains Mono", Menlo, Monaco, Consolas, "Courier New", monospace;

  /* 排版尺度 */
  --leading-tight: 1.2;
  --leading-body:  1.7;
  --tracking-wide: 0.06em;

  /* 节奏 */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.5rem;
  --space-6: 2rem;
  --space-8: 3rem;
  --space-10: 4rem;
  --space-12: 6rem;
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: var(--leading-body);
  color: var(--ink);
  background-color: var(--paper);
  /* 纸面纹理：一层非常淡的横线 + 噪点 */
  background-image:
    repeating-linear-gradient(
      to bottom,
      transparent 0 28px,
      rgba(154, 132, 96, 0.04) 28px 29px
    );
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "palt", "kern";
  text-rendering: optimizeLegibility;
}

/* 全局焦点态：保留可见焦点环，去掉点击时的高亮抖动 */
:focus-visible {
  outline: 2px solid var(--vermilion);
  outline-offset: 2px;
  border-radius: 1px;
}
:focus:not(:focus-visible) { outline: none; }

a {
  color: inherit;
  text-decoration: none;
  text-underline-offset: 4px;
  text-decoration-thickness: 1px;
}
a:hover { color: var(--vermilion); text-decoration: underline; }

button {
  font: inherit;
  color: inherit;
  background: transparent;
  border: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

hr.rule {
  border: 0;
  border-top: 1px solid var(--rule);
  margin: var(--space-6) 0;
}
hr.rule--double {
  border: 0;
  border-top: 1px solid var(--rule);
  position: relative;
  margin: var(--space-6) 0;
}
hr.rule--double::after {
  content: "";
  display: block;
  border-top: 3px double var(--rule);
  margin-top: 4px;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

.skip-link {
  position: absolute;
  inset: auto auto auto -9999px;
  background: var(--ink);
  color: var(--paper);
  padding: 8px 12px;
  z-index: 100;
}
.skip-link:focus {
  inset: 8px auto auto 8px;
}

/* =========================================================
   页眉
   ========================================================= */
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in srgb, var(--paper) 92%, transparent);
  backdrop-filter: saturate(1.1) blur(8px);
  -webkit-backdrop-filter: saturate(1.1) blur(8px);
  border-bottom: 1px solid var(--rule);
  /* 安全区，留出刘海 */
  padding-top: env(safe-area-inset-top);
}

.site-header__inner {
  display: flex;
  align-items: center;
  gap: var(--space-5);
  max-width: 84rem;
  margin: 0 auto;
  padding: 0.875rem clamp(1rem, 3vw, 2rem);
}

.site-header__brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
}
.site-header__brand:hover { color: inherit; text-decoration: none; }
.site-header__brand:hover .site-header__title-main { color: var(--vermilion); }

.site-header__seal {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 20px;
  color: var(--paper);
  background: var(--seal-bg);
  /* 模拟印章：略带不规则边缘 */
  clip-path: polygon(
    4% 6%, 12% 0%, 88% 2%, 96% 8%,
    100% 24%, 98% 78%, 96% 92%, 88% 100%,
    14% 96%, 4% 94%, 0% 80%, 2% 14%
  );
  letter-spacing: 0;
  user-select: none;
}

.site-header__title {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}
.site-header__title-main {
  font-family: var(--font-serif);
  font-size: 1.125rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  transition: color 160ms ease;
}
.site-header__title-sub {
  font-size: 0.7rem;
  color: var(--ink-soft);
  letter-spacing: var(--tracking-wide);
  font-feature-settings: "tnum";
}

/* 搜索 */
.search {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
  max-width: 32rem;
  margin-left: auto;
}
.search__label {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-serif);
  font-size: 0.85rem;
  color: var(--ink-soft);
  pointer-events: none;
  letter-spacing: var(--tracking-wide);
}
.search__input {
  width: 100%;
  height: 44px;
  padding: 0 3rem 0 3.5rem;
  font: inherit;
  font-size: 1rem;
  color: var(--ink);
  background: var(--paper-soft);
  border: 1px solid var(--rule);
  border-radius: 2px;
  transition: border-color 160ms ease, background-color 160ms ease;
  touch-action: manipulation;
}
.search__input::placeholder { color: var(--ink-mute); }
.search__input:hover { border-color: var(--ink-mute); }
.search__input:focus-visible {
  outline: 2px solid var(--vermilion);
  outline-offset: 1px;
  border-color: var(--vermilion);
  background: var(--paper-soft);
}
.search__hint {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--ink-mute);
  border: 1px solid var(--rule);
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--paper);
  pointer-events: none;
}

.site-header__notes {
  flex-shrink: 0;
  font-family: var(--font-serif);
  font-size: 0.95rem;
  letter-spacing: 0.2em;
  padding: 0.5rem 0.9rem;
  border: 1px solid var(--rule);
  border-radius: 2px;
  background: var(--paper-soft);
  transition: border-color 160ms ease, color 160ms ease;
  min-height: 40px;
  /* 中文字间距导致最后字偏左，做一下补偿 */
  padding-right: calc(0.9rem - 0.2em);
}
.site-header__notes:hover {
  color: var(--vermilion);
  border-color: var(--vermilion);
}

/* =========================================================
   主体容器
   ========================================================= */
.view-host {
  max-width: 84rem;
  margin: 0 auto;
  padding: var(--space-8) clamp(1rem, 3vw, 2rem) var(--space-12);
  outline: none;
}

/* =========================================================
   首页：扉页 + 章节目录
   ========================================================= */
.page-home {
  display: flex;
  flex-direction: column;
  gap: var(--space-8);
}

/* 扉页区 */
.cover {
  padding: var(--space-8) 0 var(--space-6);
  text-align: left;
  position: relative;
}
.cover__eyebrow {
  margin: 0 0 var(--space-5);
  font-family: var(--font-serif);
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  font-size: 0.85rem;
}
.cover__title {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 700;
  color: var(--ink);
  line-height: 1.05;
  display: flex;
  flex-direction: column;
  text-wrap: balance;
}
.cover__title-line--small {
  font-size: clamp(2rem, 5vw, 3rem);
  letter-spacing: 0.32em;
  color: var(--ink-soft);
  margin-bottom: var(--space-2);
}
.cover__title-line--large {
  font-size: clamp(3.75rem, 12vw, 8.5rem);
  letter-spacing: 0.12em;
}
.cover__year {
  margin: var(--space-5) 0 0;
  font-family: var(--font-serif);
  font-size: clamp(1.25rem, 2.4vw, 1.75rem);
  letter-spacing: 0.5em;
  color: var(--vermilion);
}

/* 三联数字 */
.cover__stats {
  margin: var(--space-8) 0 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-5);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: var(--space-5) 0;
}
.cover__stats > div {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: var(--space-2);
}
.cover__stats dt {
  font-family: var(--font-serif);
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  color: var(--ink-soft);
  order: 2;
}
.cover__stats dd {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: clamp(2.75rem, 7vw, 4.5rem);
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums lining-nums;
  font-feature-settings: "tnum", "lnum";
  order: 1;
}

/* 章节目录 */
.section-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  letter-spacing: 0.5em;
  color: var(--ink-soft);
  margin: 0 0 var(--space-5);
  font-weight: 400;
}
.catalog__list {
  margin: 0;
  padding: 0;
  list-style: none;
  counter-reset: cat;
  display: grid;
  grid-template-columns: 1fr;
}

.catalog-item {
  display: grid;
  grid-template-columns: 4.5rem auto 1fr auto;
  gap: var(--space-4);
  align-items: baseline;
  padding: var(--space-5) var(--space-2);
  border-top: 1px solid var(--rule-soft);
  text-decoration: none;
  color: inherit;
  transition: background-color 180ms ease, color 180ms ease;
  position: relative;
}
.catalog-item:last-child { border-bottom: 1px solid var(--rule-soft); }
.catalog-item:hover {
  background-color: color-mix(in srgb, var(--paper-soft) 80%, transparent);
  color: var(--vermilion);
  text-decoration: none;
}
.catalog-item:hover .catalog-item__dots { color: var(--vermilion); }

.catalog-item__code {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 2.25rem;
  letter-spacing: 0.05em;
  color: var(--vermilion);
  font-variant-numeric: tabular-nums lining-nums;
}
.catalog-item__name {
  font-family: var(--font-serif);
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: 0.12em;
}
.catalog-item__dots {
  /* 占位的虚线引线，靠 border 实现 */
  align-self: center;
  height: 0;
  border-bottom: 1px dotted var(--rule);
  transform: translateY(0.4em);
}
.catalog-item__count {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.catalog-item__count em {
  font-style: normal;
  font-weight: 700;
  color: var(--ink);
  margin-right: 0.25em;
}

/* 扉页页脚 */
.cover__footer {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  color: var(--ink-soft);
  font-size: 0.95rem;
}
.cover__hint { margin: 0; }
.cover__legend { margin: 0; }
.cover__legend em.tag {
  font-style: normal;
  margin: 0 0.15em;
}

/* T / K 标签 */
.tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  padding: 0 0.35rem;
  height: 1.2rem;
  border: 1px solid currentColor;
  border-radius: 2px;
  vertical-align: middle;
}
.tag--T { color: var(--vermilion); }
.tag--K { color: var(--indigo); }

/* =========================================================
   面包屑
   ========================================================= */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: var(--space-5);
  letter-spacing: 0.08em;
}
.breadcrumb a { color: var(--ink-soft); }
.breadcrumb a:hover { color: var(--vermilion); }

/* =========================================================
   门类页
   ========================================================= */
.cat-head {
  padding: var(--space-4) 0 var(--space-6);
}
.cat-head__code {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: clamp(2.5rem, 6vw, 4rem);
  color: var(--vermilion);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: 0.05em;
}
.cat-head__title {
  margin: 0.5rem 0 0;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: clamp(2.25rem, 5.5vw, 3.5rem);
  letter-spacing: 0.15em;
  line-height: 1.1;
}
.cat-head__meta {
  margin: var(--space-4) 0 0;
  font-family: var(--font-serif);
  letter-spacing: 0.18em;
  color: var(--ink-soft);
  font-size: 0.95rem;
}
.cat-head__meta .dot { margin: 0 var(--space-2); color: var(--rule); }

.cat-body {
  display: grid;
  grid-template-columns: 14rem minmax(0, 1fr);
  gap: var(--space-8);
  align-items: start;
}

.cat-toc {
  position: sticky;
  top: 86px;
  align-self: start;
  font-size: 0.92rem;
}
.cat-toc ul {
  list-style: none;
  margin: 0;
  padding: 0;
  border-left: 1px solid var(--rule);
}
.cat-toc li { margin: 0; }
.cat-toc a {
  display: flex;
  align-items: baseline;
  gap: var(--space-2);
  padding: 0.55rem var(--space-3);
  border-left: 2px solid transparent;
  margin-left: -1px;
  color: var(--ink-soft);
  transition: color 160ms ease, border-color 160ms ease, background-color 160ms ease;
}
.cat-toc a:hover { color: var(--vermilion); text-decoration: none; }
.cat-toc a[aria-current="true"] {
  color: var(--ink);
  border-left-color: var(--vermilion);
  background: color-mix(in srgb, var(--paper-soft) 60%, transparent);
}
.cat-toc__num {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-mute);
  font-variant-numeric: tabular-nums;
}

.cat-content { min-width: 0; }

.cls-block { margin: 0 0 var(--space-10); scroll-margin-top: 96px; }
.cls-block:last-child { margin-bottom: 0; }

.cls-block__head {
  display: flex;
  align-items: baseline;
  gap: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--rule);
  margin-bottom: var(--space-4);
}
.cls-block__code {
  font-family: var(--font-mono);
  font-size: 0.92rem;
  color: var(--vermilion);
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
}
.cls-block__name {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1.45rem;
  letter-spacing: 0.1em;
}
.cls-block__count {
  margin-left: auto;
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-variant-numeric: tabular-nums;
}

.major-grid {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 18rem), 1fr));
  gap: 1px;
  background-color: var(--rule-soft);
  border: 1px solid var(--rule-soft);
}

.major {
  display: flex;
  align-items: stretch;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-4);
  background: var(--paper-soft);
  text-align: left;
  text-decoration: none;
  color: inherit;
  min-height: 84px;
  transition: background-color 180ms ease, color 180ms ease;
  width: 100%;
  cursor: pointer;
}
.major:hover {
  background: var(--paper);
  color: var(--vermilion);
  text-decoration: none;
}
.major:hover .major__name { color: var(--vermilion); }

.major__code {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  color: var(--ink-mute);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  padding-top: 2px;
  min-width: 5.2rem;
}
.major__main {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
  flex: 1 1 auto;
}
.major__name {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: 0.05em;
  line-height: 1.35;
  color: var(--ink);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.4em;
  word-break: break-word;
}
.major__name .tag { font-size: 0.6rem; height: 1.05rem; }
.major__note {
  font-size: 0.78rem;
  color: var(--ink-soft);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.major__has-intro {
  font-family: var(--font-serif);
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: var(--vermilion);
  margin-top: 2px;
}

/* =========================================================
   搜索结果
   ========================================================= */
.search-head { padding: var(--space-2) 0 var(--space-5); }
.search-head__title {
  margin: 0;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: clamp(1.75rem, 4vw, 2.5rem);
  letter-spacing: 0.08em;
}
.search-head__meta {
  margin: var(--space-3) 0 0;
  font-family: var(--font-serif);
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  font-size: 0.9rem;
  font-variant-numeric: tabular-nums;
}
.search-results { display: flex; flex-direction: column; gap: var(--space-8); }
.search-empty {
  margin-top: var(--space-6);
  padding: var(--space-6);
  text-align: center;
  border: 1px dashed var(--rule);
  color: var(--ink-soft);
  font-family: var(--font-serif);
  letter-spacing: 0.1em;
}
mark.hl {
  background: rgba(156, 42, 28, 0.15);
  color: inherit;
  padding: 0 1px;
  border-radius: 1px;
}

/* =========================================================
   抽屉（专业详情 / 凡例）
   ========================================================= */
.drawer {
  position: fixed;
  inset: 0;
  z-index: 80;
  pointer-events: none;
}
.drawer[hidden] { display: none; }
.drawer__scrim {
  position: absolute;
  inset: 0;
  background: rgba(26, 24, 21, 0.32);
  opacity: 0;
  transition: opacity 220ms ease;
  pointer-events: auto;
}
.drawer__panel {
  position: absolute;
  inset: 0 0 0 auto;
  width: min(100%, 36rem);
  background: var(--paper);
  border-left: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 280ms cubic-bezier(0.2, 0.7, 0.2, 1);
  pointer-events: auto;
  overscroll-behavior: contain;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
.drawer.is-open .drawer__scrim { opacity: 1; }
.drawer.is-open .drawer__panel { transform: translateX(0); }

.drawer__head {
  display: flex;
  justify-content: flex-end;
  padding: var(--space-3) var(--space-3) 0;
}
.drawer__close {
  width: 44px;
  height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--rule);
  border-radius: 2px;
  font-family: var(--font-serif);
  font-size: 1.5rem;
  line-height: 1;

.drawer__close:hover { color: var(--vermilion); border-color: var(--vermilion); }

.drawer__body {
  flex: 1 1 auto;

}

/* 专业详情 */
.detail__eyebrow {
  font-family: var(--font-serif);
  letter-spacing: 0.25em;
  color: var(--ink-soft);
  font-size: 0.8rem;
}
.detail__code {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--vermilion);
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
  margin: var(--space-3) 0 var(--space-2);
}
.detail__name {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 4vw, 2.75rem);
  font-weight: 700;
  letter-spacing: 0.12em;
  line-height: 1.15;
  margin: 0 0 var(--space-4);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.4em;
}
.detail__name .tag { font-size: 0.7rem; height: 1.3rem; }

.detail__meta {
  margin: 0 0 var(--space-5);
  padding: var(--space-3) 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  display: grid;
  grid-template-columns: 6.5rem 1fr;
  row-gap: var(--space-2);
  column-gap: var(--space-3);
  font-size: 0.92rem;
}
.detail__meta dt {
  color: var(--ink-soft);
  font-family: var(--font-serif);
  letter-spacing: 0.18em;
}
.detail__meta dd {
  margin: 0;
  color: var(--ink);
  font-family: var(--font-serif);
}

.detail__section {
  margin: var(--space-5) 0 0;
}
.detail__section h3 {
  margin: 0 0 var(--space-3);
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--ink-soft);
}
.detail__section p {
  margin: 0 0 var(--space-3);
  line-height: var(--leading-body);
  color: var(--ink);
}
.detail__section .placeholder {
  padding: var(--space-4);
  border: 1px dashed var(--rule);
  color: var(--ink-soft);
  font-family: var(--font-serif);
  letter-spacing: 0.05em;
  background: color-mix(in srgb, var(--paper-soft) 60%, transparent);
}

/* 凡例 */
.notes-body h2 {
  margin: 0 0 var(--space-5);
  font-family: var(--font-serif);
  font-size: 1.5rem;
  letter-spacing: 0.3em;
  font-weight: 700;
}
.notes-body ol {
  margin: 0;
  padding: 0;
  list-style: none;
  counter-reset: notes;
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}
.notes-body li {
  display: grid;
  grid-template-columns: 2.2rem 1fr;
  gap: var(--space-3);
  align-items: baseline;
}
.notes-body li::before {
  counter-increment: notes;
  content: counter(notes, cjk-decimal) "、";
  font-family: var(--font-serif);
  font-size: 1.1rem;
  color: var(--vermilion);
  letter-spacing: 0;
}
.notes-body p {
  margin: 0;
  line-height: var(--leading-body);
}

/* =========================================================
   动效（克制）：标题入场、分隔线展开
   ========================================================= */
@media (prefers-reduced-motion: no-preference) {
  .cover__eyebrow,
  .cover__title-line--small,
  .cover__title-line--large,
  .cover__year,
  .cover__stats {
    opacity: 0;
    transform: translateY(8px);
    animation: rise 600ms ease-out forwards;
  }
  .cover__title-line--small { animation-delay: 80ms; }
  .cover__title-line--large { animation-delay: 160ms; }
  .cover__year             { animation-delay: 320ms; }
  .cover__stats            { animation-delay: 440ms; }

  .catalog__list > li > .catalog-item {
    opacity: 0;
    transform: translateY(4px);
    animation: rise 420ms ease-out forwards;
    /* 通过内联 --i 控制错落延迟 */
    animation-delay: calc(80ms + var(--i, 0) * 45ms);
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
}

/* =========================================================
   响应式 / 平板优先
   ========================================================= */
@media (max-width: 880px) {
  .cat-body {
    grid-template-columns: 1fr;
  }
  .cat-toc {
    position: relative;
    top: 0;
    margin-bottom: var(--space-5);
    padding-bottom: var(--space-4);
    border-bottom: 1px solid var(--rule);
  }
  .cat-toc ul {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    border-left: 0;
  }
  .cat-toc a {
    padding: 0.4rem 0.7rem;
    border: 1px solid var(--rule);
    border-left-width: 1px;
    border-radius: 2px;
  }
  .cat-toc a[aria-current="true"] {
    background: var(--paper-deep);
    border-color: var(--ink-soft);
  }
  .catalog-item {
    grid-template-columns: 3rem 1fr auto;
    gap: var(--space-3);
    padding: var(--space-4) var(--space-2);
  }
  .catalog-item__code { font-size: 1.5rem; }
  .catalog-item__name { font-size: 1.25rem; }
  .catalog-item__dots { display: none; }
}

@media (max-width: 640px) {
  .site-header__title-sub { display: none; }
  .search__hint { display: none; }
  .site-header__notes {
    padding: 0.5rem 0.6rem;
    letter-spacing: 0.1em;
    padding-right: calc(0.6rem - 0.1em);
  }
  .cover__stats { grid-template-columns: repeat(3, 1fr); gap: var(--space-3); }
}

/* 视觉减弱选项 */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

<script>
/* 本科专业目录 · 2026 — 前端交互 */
(function () {
  "use strict";

  const DATA = window.MAJORS_DATA;
  if (!DATA) {
    console.error("MAJORS_DATA 未加载");
    return;
  }

  // ---------- 工具 ----------
  const $ = (s, r = document) => r.querySelector(s);
  const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

  const escapeHTML = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );

  // 高亮：对名字中匹配 query 的子串包裹 <mark>
  const highlight = (text, q) => {
    if (!q) return escapeHTML(text);
    const safe = escapeHTML(text);
    const safeQ = escapeHTML(q).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return safe.replace(new RegExp(safeQ, "gi"), (m) => `<mark class="hl">${m}</mark>`);
  };

  // 扁平化索引，加速搜索
  const FLAT = [];
  for (const cat of DATA.categories) {
    for (const cls of cat.classes) {
      for (const m of cls.majors) {
        FLAT.push({
          ...m,
          categoryCode: cat.code,
          categoryName: cat.name,
          classCode: cls.code,
          className: cls.name,
          classSynthetic: !!cls.synthetic,
        });
      }
    }
  }

  // ---------- 路由 ----------
  function parseRoute() {
    const h = (location.hash || "").replace(/^#\/?/, "");
    if (!h) return { view: "home" };
    const parts = h.split("/").filter(Boolean);
    if (parts[0] === "c" && parts[1]) return { view: "category", code: parts[1] };
    if (parts[0] === "q" && parts.length > 1) {
      return { view: "search", query: decodeURIComponent(parts.slice(1).join("/")) };
    }
    return { view: "home" };
  }

  function navigate(hash, { replace = false } = {}) {
    if (replace) history.replaceState(null, "", hash);
    else if (location.hash === hash) render();
    else location.hash = hash;
  }

  // ---------- 渲染 ----------
  const host = $("#main");

  function clearHost() {
    host.innerHTML = "";
    // 切换视图时回到顶部，避免沿用上一个视图的滚动位置
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
  }

  function setTitle(suffix) {
    const base = "本科专业目录 · 2026 · 教育部";
    document.title = suffix ? `${suffix} · ${base}` : base;
  }

  // 首页
  function renderHome() {
    clearHost();
    host.appendChild($("#tpl-home").content.cloneNode(true));
    setTitle("");

    $("[data-stat=categories]").textContent = DATA.stats.categories;
    $("[data-stat=classes]").textContent = DATA.stats.classes;
    $("[data-stat=majors]").textContent = DATA.stats.majors;

    const list = $("#catalog-list");
    const frag = document.createDocumentFragment();
    DATA.categories.forEach((cat, idx) => {
      const count = cat.classes.reduce((s, c) => s + c.majors.length, 0);
      const li = document.createElement("li");
      li.style.setProperty("--i", idx);
      li.innerHTML = `
        <a class="catalog-item" href="#/c/${cat.code}">
          <span class="catalog-item__code">${cat.code}</span>
          <span class="catalog-item__name">${escapeHTML(cat.name)}</span>
          <span class="catalog-item__dots" aria-hidden="true"></span>
          <span class="catalog-item__count"><em>${count}</em>本科专业</span>
        </a>`;
      frag.appendChild(li);
    });
    list.appendChild(frag);
  }

  // 门类页
  function renderCategory(code) {
    const cat = DATA.categories.find((c) => c.code === code);
    if (!cat) return navigate("");

    clearHost();
    host.appendChild($("#tpl-category").content.cloneNode(true));
    setTitle(`${cat.code} ${cat.name}`);

    $("[data-breadcrumb-current]").textContent = cat.name;
    $("[data-cat-code]").textContent = cat.code;
    $("[data-cat-name]").textContent = cat.name;

    const realClasses = cat.classes.filter((c) => !c.synthetic);
    const totalMajors = cat.classes.reduce((s, c) => s + c.majors.length, 0);
    $("[data-cat-class-count]").textContent = realClasses.length || cat.classes.length;
    $("[data-cat-major-count]").textContent = totalMajors;

    // TOC
    const toc = $("[data-cat-toc]");
    const tocFrag = document.createDocumentFragment();
    for (const cls of cat.classes) {
      const li = document.createElement("li");
      const label = cls.synthetic ? "直辖专业" : escapeHTML(cls.name);
      const num = cls.synthetic ? "·" : cls.code;
      li.innerHTML = `
        <a href="#cls-${cls.code}" data-toc-target="cls-${cls.code}">
          <span class="cat-toc__num">${num}</span>
          <span>${label}</span>
        </a>`;
      tocFrag.appendChild(li);
    }
    toc.appendChild(tocFrag);

    // 内容
    const content = $("[data-cat-content]");
    const contentFrag = document.createDocumentFragment();
    for (const cls of cat.classes) {
      const sec = document.createElement("section");
      sec.className = "cls-block";
      sec.id = `cls-${cls.code}`;

      const head = document.createElement("div");
      head.className = "cls-block__head";
      if (cls.synthetic) {
        head.innerHTML = `
          <h2 class="cls-block__name">本门类直辖专业</h2>
          <span class="cls-block__count">${cls.majors.length} 个本科专业</span>`;
      } else {
        head.innerHTML = `
          <span class="cls-block__code">${cls.code}</span>
          <h2 class="cls-block__name">${escapeHTML(cls.name)}</h2>
          <span class="cls-block__count">${cls.majors.length} 个本科专业</span>`;
      }
      sec.appendChild(head);

      const grid = document.createElement("ul");
      grid.className = "major-grid";
      for (const m of cls.majors) {
        const li = document.createElement("li");
        li.appendChild(majorButton(m, cat, cls));
        grid.appendChild(li);
      }
      sec.appendChild(grid);
      contentFrag.appendChild(sec);
    }
    content.appendChild(contentFrag);

    setupTocObserver();

    // 平滑滚动锚点
    toc.addEventListener("click", (e) => {
      const a = e.target.closest("a[data-toc-target]");
      if (!a) return;
      const target = document.getElementById(a.dataset.tocTarget);
      if (!target) return;
      e.preventDefault();
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }

  // 单条专业按钮
  function majorButton(m, cat, cls, opts = {}) {
    const { query = "", showPath = false } = opts;
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "major";
    btn.dataset.majorCode = m.code;

    const tags = [];
    if (m.isSpecial) tags.push('<em class="tag tag--T" aria-label="特设专业">T</em>');
    if (m.isControlled) tags.push('<em class="tag tag--K" aria-label="国家控制布点专业">K</em>');

    const nameHTML = query ? highlight(m.name, query) : escapeHTML(m.name);
    const codeHTML = query ? highlight(m.code, query) : escapeHTML(m.code);

    let pathLine = "";
    if (showPath) {
      const cls2 = cls && !cls.synthetic ? ` · ${escapeHTML(cls.name)}` : "";
      pathLine = `<span class="major__note">${cat.code} ${escapeHTML(cat.name)}${cls2}</span>`;
    } else if (m.note) {
      pathLine = `<span class="major__note">${escapeHTML(m.note)}</span>`;
    }

    btn.innerHTML = `
      <span class="major__code">${codeHTML}</span>
      <span class="major__main">
        <span class="major__name">${nameHTML}${tags.join("")}</span>
        ${pathLine}
        ${m.intro ? `<span class="major__has-intro">查看专业介绍 →</span>` : ""}
      </span>`;

    btn.addEventListener("click", () => openMajorDetail(m, cat, cls));
    return btn;
  }

  // 搜索页
  function renderSearch(query) {
    clearHost();
    host.appendChild($("#tpl-search").content.cloneNode(true));
    setTitle(`检索：${query}`);

    $("[data-search-q]").textContent = query;
    const results = filterMajors(query);
    $("[data-search-count]").textContent = results.length;

    const container = $("[data-search-results]");
    const emptyEl = $("[data-search-empty]");

    if (results.length === 0) {
      emptyEl.hidden = false;
      return;
    }
    emptyEl.hidden = true;

    // 按门类分组
    const byCat = new Map();
    for (const m of results) {
      if (!byCat.has(m.categoryCode)) byCat.set(m.categoryCode, []);
      byCat.get(m.categoryCode).push(m);
    }

    const frag = document.createDocumentFragment();
    for (const [catCode, items] of byCat) {
      const cat = DATA.categories.find((c) => c.code === catCode);
      const sec = document.createElement("section");
      sec.className = "cls-block";

      const head = document.createElement("div");
      head.className = "cls-block__head";
      head.innerHTML = `
        <span class="cls-block__code">${cat.code}</span>
        <h2 class="cls-block__name"><a href="#/c/${cat.code}">${escapeHTML(cat.name)}</a></h2>
        <span class="cls-block__count">${items.length} 个匹配</span>`;
      sec.appendChild(head);

      const grid = document.createElement("ul");
      grid.className = "major-grid";
      for (const m of items) {
        const cls = cat.classes.find((c) => c.code === m.classCode);
        const li = document.createElement("li");
        li.appendChild(
          majorButton(m, cat, cls, { query, showPath: !cls?.synthetic && true })
        );
        grid.appendChild(li);
      }
      sec.appendChild(grid);
      frag.appendChild(sec);
    }
    container.appendChild(frag);
  }

  // 搜索过滤：匹配代码、专业名、专业类名、门类名
  function filterMajors(q) {
    const qs = q.trim().toLowerCase();
    if (!qs) return [];
    return FLAT.filter((m) => {
      return (
        m.code.toLowerCase().includes(qs) ||
        m.name.toLowerCase().includes(qs) ||
        (!m.classSynthetic && m.className.toLowerCase().includes(qs)) ||
        m.categoryName.toLowerCase().includes(qs)
      );
    });
  }

  // ---------- TOC 同步高亮 ----------
  let tocObserver = null;
  function setupTocObserver() {
    if (tocObserver) tocObserver.disconnect();
    const links = $$("[data-toc-target]");
    if (!links.length) return;
    const targets = links
      .map((a) => document.getElementById(a.dataset.tocTarget))
      .filter(Boolean);
    if (!targets.length) return;

    tocObserver = new IntersectionObserver(
      (entries) => {
        // 找出最靠近顶部的可见块
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => a.target.offsetTop - b.target.offsetTop);
        if (!visible.length) return;
        const id = visible[0].target.id;
        for (const a of links) {
          if (a.dataset.tocTarget === id) a.setAttribute("aria-current", "true");
          else a.removeAttribute("aria-current");
        }
      },
      { rootMargin: "-96px 0px -60% 0px", threshold: 0 }
    );
    targets.forEach((t) => tocObserver.observe(t));
  }

  // ---------- 抽屉 ----------
  const drawer = $("#drawer");
  const drawerBody = $("#drawer-body");
  const notesDialog = $("#notes-dialog");
  const notesBody = $("#notes-body");

  let lastFocus = null;

  function openDrawer(el) {
    lastFocus = document.activeElement;
    el.hidden = false;
    el.setAttribute("aria-hidden", "false");
    requestAnimationFrame(() => el.classList.add("is-open"));
    document.body.style.overflow = "hidden";
    // 把焦点移到关闭按钮
    const close = el.querySelector(".drawer__close");
    if (close) close.focus({ preventScroll: true });
  }

  function closeDrawer(el) {
    el.classList.remove("is-open");
    el.setAttribute("aria-hidden", "true");
    setTimeout(() => {
      el.hidden = true;
      document.body.style.overflow = "";
      if (lastFocus && lastFocus.focus) lastFocus.focus({ preventScroll: true });
    }, 260);
  }

  function openMajorDetail(m, cat, cls) {
    const tags = [];
    if (m.isSpecial) tags.push('<em class="tag tag--T" aria-label="特设专业">T</em>');
    if (m.isControlled) tags.push('<em class="tag tag--K" aria-label="国家控制布点专业">K</em>');

    const typeLabel = [
      m.isSpecial ? "特设专业（T）" : "基本专业",
      m.isControlled ? "国家控制布点（K）" : null,
    ]
      .filter(Boolean)
      .join(" · ");

    const classRow = cls && !cls.synthetic
      ? `<dt>所属专业类</dt><dd>${cls.code} ${escapeHTML(cls.name)}</dd>`
      : `<dt>所属层级</dt><dd>${escapeHTML(cat.name)}（直辖）</dd>`;

    const noteHTML = m.note
      ? `<section class="detail__section">
           <h3>官方括注</h3>
           <p>${escapeHTML(m.note)}</p>
         </section>`
      : "";

    const introHTML = m.intro
      ? `<section class="detail__section">
           <h3>专业介绍</h3>
           ${renderIntro(m.intro)}
         </section>`
      : `<section class="detail__section">
           <h3>专业介绍</h3>
           <div class="placeholder">该专业的介绍正在筹备中，敬请期待。</div>
         </section>`;

    drawerBody.innerHTML = `
      <p class="detail__eyebrow">${cat.code} ${escapeHTML(cat.name)}</p>
      <p class="detail__code" translate="no">${escapeHTML(m.code)}</p>
      <h2 class="detail__name" id="drawer-title">
        ${escapeHTML(m.name)}${tags.join("")}
      </h2>
      <dl class="detail__meta">
        <dt>专业代码</dt><dd translate="no">${escapeHTML(m.code)}</dd>
        ${classRow}
        <dt>所属门类</dt><dd>${cat.code} ${escapeHTML(cat.name)}</dd>
        <dt>专业类型</dt><dd>${typeLabel}</dd>
      </dl>
      ${noteHTML}
      ${introHTML}
      <section class="detail__section">
        <h3>查看同类</h3>
        <p><a href="#/c/${cat.code}">前往「${escapeHTML(cat.name)}」门类目录页 →</a></p>
      </section>`;

    openDrawer(drawer);
  }

  function renderIntro(intro) {
    // 支持字符串或 {summary, points: [], outlets: []} 这类结构，按你后续定义扩展
    if (typeof intro === "string") {
      return `<p>${escapeHTML(intro)}</p>`;
    }
    if (intro && typeof intro === "object") {
      let html = "";
      if (intro.summary) html += `<p>${escapeHTML(intro.summary)}</p>`;
      if (Array.isArray(intro.points) && intro.points.length) {
        html += `<ul>${intro.points.map((p) => `<li>${escapeHTML(p)}</li>`).join("")}</ul>`;
      }
      if (Array.isArray(intro.outlets) && intro.outlets.length) {
        html += `<p><strong>典型出口：</strong>${intro.outlets.map(escapeHTML).join(" / ")}</p>`;
      }
      return html || `<p>${escapeHTML(JSON.stringify(intro))}</p>`;
    }
    return "";
  }

  function openNotes() {
    notesBody.innerHTML = `
      <div class="notes-body">
        <h2 id="notes-title">凡　例</h2>
        <ol>
          ${DATA.meta.notes.map((n) => `<li><p>${escapeHTML(n)}</p></li>`).join("")}
        </ol>
      </div>`;
    openDrawer(notesDialog);
  }

  // ---------- 搜索框 ----------
  const searchForm = $("#search-form");
  const searchInput = $("#search-input");

  let searchDebounce = null;
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim();
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      if (!q) {
        navigate("");
      } else {
        navigate(`#/q/${encodeURIComponent(q)}`);
      }
    }, 120);
  });
  searchForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const q = searchInput.value.trim();
    if (q) navigate(`#/q/${encodeURIComponent(q)}`);
  });

  // ---------- 全局快捷键 ----------
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (drawer.classList.contains("is-open")) return closeDrawer(drawer);
      if (notesDialog.classList.contains("is-open")) return closeDrawer(notesDialog);
    }
    // 在输入框/可编辑元素之外按 "/" 聚焦搜索框
    const tag = (e.target && e.target.tagName) || "";
    const inField = tag === "INPUT" || tag === "TEXTAREA" || e.target?.isContentEditable;
    if (e.key === "/" && !inField && !e.metaKey && !e.ctrlKey && !e.altKey) {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

  // 关闭抽屉
  document.addEventListener("click", (e) => {
    if (e.target.matches("[data-close]") || e.target.closest("[data-close]")) {
      if (drawer.classList.contains("is-open")) closeDrawer(drawer);
      else if (notesDialog.classList.contains("is-open")) closeDrawer(notesDialog);
    }
  });

  $("#open-notes").addEventListener("click", openNotes);

  // ---------- 主渲染 ----------
  function render() {
    const route = parseRoute();
    // 同步搜索框文本（如果从其他视图跳回 home）
    if (route.view !== "search" && searchInput.value && !document.activeElement?.matches("#search-input")) {
      searchInput.value = "";
    }
    if (route.view === "search" && searchInput.value !== route.query) {
      // 不打断用户输入：仅当差异较大才回填
      if (document.activeElement !== searchInput) searchInput.value = route.query;
    }

    if (route.view === "home") return renderHome();
    if (route.view === "category") return renderCategory(route.code);
    if (route.view === "search") return renderSearch(route.query);
    renderHome();
  }

  window.addEventListener("hashchange", render);
  render();
})();

</script>
</body>
</html>
